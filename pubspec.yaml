name: chaput
description: "Chaput App"
publish_to: 'none'

version: 1.0.1+56

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # state
  flutter_riverpod: ^3.3.2

  # navigation
  go_router: ^17.3.0

  # network
  dio: ^5.7.0

  # local storage (tokens)
  flutter_secure_storage: ^10.3.1

  # utils
  uuid: ^4.5.1
  file_picker: ^12.0.0-beta.7

  # media
  video_player: ^2.8.6

  three_js: ^0.3.0
  three_js_core_loaders: ^0.3.0

  share_plus: ^13.2.1
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  image: ^4.7.2
  web_socket_channel: ^3.0.3
  firebase_core: ^4.4.0
  firebase_analytics: ^12.0.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^22.1.0
  shimmer: ^3.0.0
  showcaseview: ^5.0.1
  purchases_flutter: ^10.1.0
  purchases_ui_flutter: ^10.1.0
  timezone: ^0.11.1
  connectivity_plus: ^7.1.1
  three_js_math: ^0.3.0
  webview_flutter: ^4.13.1
  app_links: ^7.0.0
  audioplayers: ^6.7.1
  feedback: ^3.2.0
  package_info_plus: ^10.2.1
  device_info_plus: ^13.2.0
  upgrader: ^13.5.0
  in_app_review: ^2.0.12

  http: any
  path_provider: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

flutter:
  config:
    enable-swift-package-manager: false

  uses-material-design: true

  assets:
    - assets/tree_models/
    - assets/tree_models/three/
    - assets/videos/chaput_bg.M4V
    - assets/videos/chaput_bg_2.mp4
    - assets/images/
    - assets/images/empty_state/
    - assets/images/tree_bg.png
    - assets/images/chaput_logo_256px_h.png
    - assets/images/chaput_tying_lady.png
    - assets/images/chaput_tying_lady_2.png
    - assets/images/chaput_slider.png
    - assets/images/avatar_assets/
    - assets/images/avatar_assets/background/
    - assets/images/avatar_assets/male/
    - assets/images/avatar_assets/female/
    - assets/sounds/
    - assets/i18n/en.json
    - assets/i18n/tr.json
    - assets/i18n/de.json
    - assets/i18n/fr.json
    - assets/i18n/sv.json
    - assets/i18n/nb.json
    - assets/i18n/da.json
    - assets/i18n/fi.json
    - assets/i18n/es.json

  fonts:
    - family: Qanelas
      fonts:
        - asset: assets/fonts/QanelasThin.otf
          weight: 100
        - asset: assets/fonts/QanelasThinItalic.otf
          weight: 100
          style: italic

        - asset: assets/fonts/QanelasUltraLight.otf
          weight: 200
        - asset: assets/fonts/QanelasUltraLightItalic.otf
          weight: 200
          style: italic

        - asset: assets/fonts/QanelasLight.otf
          weight: 300
        - asset: assets/fonts/QanelasLightItalic.otf
          weight: 300
          style: italic

        - asset: assets/fonts/QanelasRegular.otf
          weight: 400
        - asset: assets/fonts/QanelasRegularItalic.otf
          weight: 400
          style: italic

        - asset: assets/fonts/QanelasMedium.otf
          weight: 500
        - asset: assets/fonts/QanelasMediumItalic.otf
          weight: 500
          style: italic

        - asset: assets/fonts/QanelasBold.otf
          weight: 700
        - asset: assets/fonts/QanelasBoldItalic.otf
          weight: 700
          style: italic

        - asset: assets/fonts/QanelasExtraBold.otf
          weight: 800
        - asset: assets/fonts/QanelasExtraBoldItalic.otf
          weight: 800
          style: italic

        - asset: assets/fonts/QanelasHeavy.otf
          weight: 900
        - asset: assets/fonts/QanelasHeavyItalic.otf
          weight: 900
          style: italic

        - asset: assets/fonts/QanelasBlack.otf
          weight: 900
        - asset: assets/fonts/QanelasBlackItalic.otf
          weight: 900
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FF000000"
  adaptive_icon_foreground: "assets/images/LogoRound.png"
